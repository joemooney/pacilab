name: paciLab CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python compile check
        run: python3 -m py_compile pacilab/*.py
      - name: Validate schemas and scenarios
        run: make validate
      - name: Run regression (mock)
        run: make sim-regress SIM_MODE=mock REGRESS_COUNT=100
      - name: Run topology (mock)
        run: make sim-topology SIM_MODE=mock
      - name: Run unit tests
        run: make test
