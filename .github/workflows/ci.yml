name: paciLab CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pacgate
        run: cargo install --path ../pacgate || echo "pacgate not in CI path; skipping binary install"
      - name: Validate scenarios
        run: make validate
      - name: Run regression
        run: make sim-regress REGRESS_COUNT=100
      - name: Run topology
        run: make sim-topology
